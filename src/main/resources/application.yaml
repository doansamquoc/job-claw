spring:
  application:
    name: Job Claw

  # Datasource/Connect to database
  datasource:
    url: jdbc:postgresql://localhost:5432/job_claw
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  # Flyway Migration
  flyway:
    enabled: true
    baseline-version: 0
    baseline-on-migrate: true
    locations: classpath:db/migration
